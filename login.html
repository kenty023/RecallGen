<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/login.css">
    <link rel="icon" type="image/x-icon" href="image/logo2.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>RecallGen | Login</title>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <img src="image/logo.png" alt="RecallGen Logo" class="auth-logo">
            <h2>Welcome to RecallGen</h2>
            <p>Your AI-powered study companion.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="login-username" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>

                <!-- REMEMBER ME  -->
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <input type="checkbox" id="remember-me"
                            style="width:16px;height:16px;accent-color:#2D5A53;cursor:pointer;">
                        <label for="remember-me"
                            style="font-size:0.85rem;color:#666;cursor:pointer;">Remember me</label>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">Login</button>
                    <button type="button" class="btn-secondary" onclick="location.href='register.html'">Register</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="script/loginscript.js"></script>
</body>
</html>
