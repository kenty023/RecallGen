<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style/result.css">
    <link rel="icon" type="image/x-icon" href="image/logo2.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>RecallGen | My Results</title>
</head>
<body id="app-body">

    <div class="glass-container">

        <!-- BURGER BUTTON — must be before sidebar -->
        <button class="burger-btn" id="burgerBtn">
            <span></span><span></span><span></span>
        </button>

        <!-- OVERLAY — must be before sidebar -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="image/logo.png" alt="RecallGen">
                <h2>RecallGen</h2>
            </div>
            <nav>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> <span>Dashboard</span></a>
                <a href="quiz.html"class="nav-item"><i class="fas fa-brain"></i> <span>Take Quiz</span></a>
                <a href="results.html"   class="nav-item active"><i class="fas fa-chart-line"></i> <span>My Results</span></a>
                <a href="modules.html"class="nav-item"><i class="fas fa-folder"></i> My Modules</a>
                <a href="settings.html"  class="nav-item"><i class="fas fa-cog"></i> <span>Settings</span></a>
            </nav>
            <button id="logout-btn" class="logout-link">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="top-nav">
                <div class="welcome-section">
                    <h1>My Results</h1>
                    <p>Track your quiz performance</p>
                </div>
                <div class="profile-preview">
                    <img src="image/default-pfp.png" id="nav-pfp" alt="Profile">
                </div>
            </header>

            <!-- STATS SUMMARY -->
            <div class="stats-summary">
                <div class="stat-box">
                    <div class="num" id="stat-total">—</div>
                    <div class="lbl">Quizzes Taken</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="stat-avg">—</div>
                    <div class="lbl">Average Score</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="stat-best">—</div>
                    <div class="lbl">Best Score</div>
                </div>
            </div>

            <!-- FILTER BUTTONS -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Multiple Choice">Multiple Choice</button>
                <button class="filter-btn" data-filter="True / False">True / False</button>
                <button class="filter-btn" data-filter="Identification">Identification</button>
            </div>

            <!-- RESULTS LIST -->
            <div class="results-list" id="results-list">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading results...</p>
                </div>
            </div>

        </main>
    </div>

    <script type="module" src="script/result.js"></script>
</body>
</html>
