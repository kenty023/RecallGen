<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/reset-password.css">
    <link rel="icon" type="image/x-icon" href="image/logo2.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>RecallGen | Reset Password</title>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-container">
        <img src="image/logo.png" alt="RecallGen Logo" class="auth-logo">

        <!-- Loading while verifying oobCode -->
        <div id="loading-state">
            <h2>Verifying link...</h2>
            <p>Please wait a moment.</p>
        </div>

        <!-- Invalid / expired link -->
        <div id="invalid-state">
            <h2>Link Expired</h2>
            <p>This password reset link is invalid or has already been used.</p>
            <a href="login.html" class="btn-primary btn-block">Back to Login</a>
        </div>

        <!-- Main reset form -->
        <div id="reset-state">
            <h2>Reset Password</h2>
            <p>Enter your new password below.</p>

            <div class="input-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="Enter new password">
                <button type="button" class="toggle-pw" id="toggle-new"
                        aria-label="Toggle password visibility"></button>
                <div id="strength-wrap">
                    <div class="strength-segments">
                        <div id="seg1"></div><div id="seg2"></div>
                        <div id="seg3"></div><div id="seg4"></div>
                    </div>
                    <div id="strength-checklist"></div>
                </div>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter new password">
                <button type="button" class="toggle-pw" id="toggle-confirm"
                        aria-label="Toggle password visibility"></button>
                <div id="match-label"></div>
            </div>

            <button class="btn-primary" id="reset-btn" disabled>Reset Password</button>
            <a href="login.html" class="back-link">← Back to Login</a>
        </div>
    </div>
</div>

<script type="module" src="script/resetscript.js"></script>
</body>
</html>
