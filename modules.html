<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style/modules.css">
    <!-- 🌙 DARK MODE -->
    <link rel="stylesheet" href="style/darkmode.css">
    <script src="script/darkmode.js"></script>
    <!-- PROFILE DROPDOWN -->
    <link rel="stylesheet" href="style/profiledropdown.css">
    <link rel="icon" type="image/x-icon" href="image/logo2.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>RecallGen | My Modules</title>
</head>
<body id="app-body">

    <div class="glass-container">

        <button class="burger-btn" id="burgerBtn">
            <span></span><span></span><span></span>
        </button>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="image/logo.png" alt="RecallGen">
                <h2>RecallGen</h2>
            </div>
            <nav>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> <span>Dashboard</span></a>

                <!-- TAKE QUIZ TOGGLE -->
                <div class="nav-group">
                    <div class="nav-item" id="take-quiz-toggle" style="cursor:pointer;">
                        <i class="fas fa-brain"></i> Create Quiz
                        <i class="fas fa-chevron-down nav-arrow" id="quiz-arrow"></i>
                    </div>
                    <div class="nav-sub open" id="quiz-sub">
                        <a href="results.html" class="nav-sub-item"><i class="fas fa-chart-line"></i> My Results</a>
                        <a href="modules.html" class="nav-sub-item active"><i class="fas fa-folder"></i> My Modules</a>
                    </div>
                </div>

                <a href="analytics.html" class="nav-item"><i class="fas fa-chart-bar"></i> <span>Analytics</span></a>
                <a href="settings.html"  class="nav-item"><i class="fas fa-cog"></i> <span>Settings</span></a>
            </nav>
            <button id="logout-btn" class="logout-link">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="top-nav">
                <div class="welcome-section">
                    <h1>My Modules</h1>
                    <p>Manage your uploaded study materials</p>
                </div>
                <div class="right-nav">
                    <a href="dashboard.html" class="btn-upload">
                        <i class="fas fa-plus"></i>New Module
                    </a>
                    <div class="profile-preview">
                        <img src="image/default-pfp.png" id="nav-pfp" alt="Profile">
                        <span id="display-username" style="display:none;"></span>
                    </div>
                </div>
            </header>

            <!-- STATS -->
            <div class="mod-stats">
                <div class="mod-stat-box">
                    <i class="fas fa-folder-open"></i>
                    <div>
                        <div class="mod-stat-num" id="stat-count">—</div>
                        <div class="mod-stat-lbl">Total Modules</div>
                    </div>
                </div>
                <div class="mod-stat-box">
                    <i class="fas fa-database"></i>
                    <div>
                        <div class="mod-stat-num" id="stat-size">—</div>
                        <div class="mod-stat-lbl">Total Size</div>
                    </div>
                </div>
            </div>

            <!-- MODULES LIST -->
            <div class="modules-list" id="modules-list">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading modules...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="script/modules.js"></script>
</body>
</html>
